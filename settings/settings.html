```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1">

<title>
إعدادات NEDSS Engine
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
rel="stylesheet">

<style>

body{

    background:#f5f7fb;

}

.card{

    border:none;

    border-radius:15px;

    box-shadow:0 0 10px rgba(0,0,0,.08);

}

.section-title{

    color:#0d6efd;

    font-weight:bold;

}

textarea{

    min-height:120px;

}

</style>

</head>

<body>

<div class="container py-4">

<h2 class="mb-4">

⚙️ إعدادات NEDSS Engine

</h2>


<!-- الإعدادات العامة -->
<div class="card mb-4">

<div class="card-body">

<h5 class="section-title mb-3">

الإعدادات العامة

</h5>

<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="autoSearch">

<label class="form-check-label">

البحث التلقائى فى صفحة استعراض الحالات

</label>

</div>


<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="mergeTabs">

<label class="form-check-label">

دمج عام + عام تكملة

</label>

</div>


<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="highlightMissing">

<label class="form-check-label">

تمييز الحقول الفارغة

</label>

</div>


<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="completionPercentage">

<label class="form-check-label">

إظهار نسبة اكتمال البيانات

</label>

</div>


<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="menLab">

<label class="form-check-label">

فتح صفحات MenLab تلقائياً

</label>

</div>

</div>

</div>



<!-- الحفظ -->
<div class="card mb-4">

<div class="card-body">

<h5 class="section-title mb-3">

الحفظ والتصدير

</h5>


<label class="form-label">

Google Sheet الإدارة

</label>

<input
class="form-control mb-3"
id="departmentSheet">



<label class="form-label">

Google Sheet المحافظة

</label>

<input
class="form-control mb-3"
id="governorateSheet">



<label class="form-label">

رابط مجلد PDF على Google Drive

</label>

<input
class="form-control mb-3"
id="pdfFolder">



<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="savePdf">

<label class="form-check-label">

حفظ التقصى PDF

</label>

</div>


<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="updateCases">

<label class="form-check-label">

تحديث الحالة إذا كانت موجودة مسبقاً

</label>

</div>


<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="saveExtraQuestions">

<label class="form-check-label">

حفظ الأسئلة الإضافية الخاصة بالقوالب

</label>

</div>

</div>

</div>




<!-- صفحة استعراض الحالات -->

<div class="card mb-4">

<div class="card-body">

<h5 class="section-title mb-3">

صفحة استعراض الحالات

</h5>

<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="openGov">

<label class="form-check-label">

فتح المحافظة تلقائياً

</label>

</div>


<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="showLinks">

<label class="form-check-label">

إظهار رابط التقصى

</label>

</div>


<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="showCasesCount">

<label class="form-check-label">

إظهار عدد الحالات

</label>

</div>



<label class="form-label mt-3">

الأمراض المستبعدة

</label>

<input
class="form-control mb-3"
id="excludedDiseases"
placeholder="85,20,44">



<label class="form-label">

الحالات المستبعدة

</label>

<input
class="form-control"
id="excludedStatus"
placeholder="1,6">

</div>

</div>




<!-- متقدم -->

<div class="card mb-4">

<div class="card-body">

<h5 class="section-title mb-3">

إعدادات متقدمة

</h5>


<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="customScripts">

<label class="form-check-label">

تشغيل أكواد JavaScript إضافية

</label>

</div>


<label class="form-label mt-3">

الأكواد المخصصة

</label>

<textarea
class="form-control"
id="customCode">

</textarea>

</div>

</div>



<div class="text-center">

<button
class="btn btn-primary btn-lg"
id="saveButton">

حفظ الإعدادات

</button>

</div>


</div>

<script src="settings.js"></script>

</body>
</html>
```
